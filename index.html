<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Siyasi Görüş Testi</title>
  <script src="https://cdn.plot.ly/plotly-2.18.3.min.js"></script>
  <style>
    body { font-family: sans-serif; max-width: 900px; margin: auto; }
    .question { margin-bottom: 15px; }
    button { padding: 10px; margin-top: 20px; }
    #chart { margin-top: 40px; height: 600px; }
  </style>
</head>
<body>

<h1>Siyasi Görüş Testi</h1>

<form id="surveyForm">
  <div class="question">1.
    <select>
      <option value="">Seç</option>
      <option value="1">1</option><option value="2">2</option>
      <option value="3">3</option><option value="4">4</option>
      <option value="5">5</option>
    </select>
  </div>
  <div class="question">2.
    <select>
      <option value="">Seç</option>
      <option value="1">1</option><option value="2">2</option>
      <option value="3">3</option><option value="4">4</option>
      <option value="5">5</option>
    </select>
  </div>
  <div class="question">3.
    <select>
      <option value="">Seç</option>
      <option value="1">1</option><option value="2">2</option>
      <option value="3">3</option><option value="4">4</option>
      <option value="5">5</option>
    </select>
  </div>
  <div class="question">4.
    <select>
      <option value="">Seç</option>
      <option value="1">1</option><option value="2">2</option>
      <option value="3">3</option><option value="4">4</option>
      <option value="5">5</option>
    </select>
  </div>
  <div class="question">5.
    <select>
      <option value="">Seç</option>
      <option value="1">1</option><option value="2">2</option>
      <option value="3">3</option><option value="4">4</option>
      <option value="5">5</option>
    </select>
  </div>
  <div class="question">6.
    <select>
      <option value="">Seç</option>
      <option value="1">1</option><option value="2">2</option>
      <option value="3">3</option><option value="4">4</option>
      <option value="5">5</option>
    </select>
  </div>
  <button type="submit">Sonucumu Gör</button>
</form>

<div id="chart"></div>

<script>
const positions = {
  CHP: [0.8,0.5,0.3],
  AKP: [0.2,0.2,0.6],
  MHP: [0.5,0.3,0.4]
};

document.getElementById("surveyForm").addEventListener("submit", function(e) {
  e.preventDefault();

  const selects = document.querySelectorAll("#surveyForm select");
  const vals = [];

  for (const s of selects) {
    if (!s.value) { alert("Hepsini doldur"); return; }
    vals.push(Number(s.value));
  }

  const scale = v => (v-1)/4;
  const laiklik = scale(vals[0]);
  const yonetim = scale(vals[1]);
  const ekonomi = scale(vals[2]);

  const x=[],y=[],z=[],labels=[];
  for (const k in positions) {
    x.push(positions[k][0]);
    y.push(positions[k][1]);
    z.push(positions[k][2]);
    labels.push(k);
  }

  x.push(laiklik); y.push(yonetim); z.push(ekonomi); labels.push("Siz");

  Plotly.newPlot("chart",[{
    type:"scatter3d",
    mode:"markers+text",
    x,y,z,text:labels
  }]);
});
</script>

</body>
</html>
